services:
###> dunglas/symfony-docker ###
  php:
    build:
      context: .
      target: frankenphp_prod
    restart: unless-stopped
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}, php:80
      APP_ENV: ${APP_ENV:-prod}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: mysql://${MYSQL_USER:-app}:${MYSQL_PASSWORD:-!ChangeMe!}@database:3306/${MYSQL_DATABASE:-app}?serverVersion=${MARIADB_VERSION:-10.11.2-MariaDB}&charset=utf8mb4
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
      MAILER_DSN: ${MAILER_DSN:-null://null}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - target: 80
        published: ${HTTP_PORT:-80}
      - target: 443
        published: ${HTTPS_PORT:-443}
      - target: 443
        published: ${HTTP3_PORT:-443}
        protocol: udp
    depends_on:
      - database
###< dunglas/symfony-docker ###

###> doctrine/doctrine-bundle ###
  database:
    image: mariadb:${MARIADB_VERSION:-11}
    environment:
      MARIADB_DATABASE: ${MYSQL_DATABASE:-app}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-!ChangeMe!}
      MARIADB_USER: ${MYSQL_USER:-app}
      # You should definitely change the password in production
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-!ChangeMe!}
    volumes:
      - database_data:/var/lib/mysql:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/mysql:rw
###< doctrine/doctrine-bundle ###

volumes:
###> dunglas/symfony-docker ###
  caddy_data:
  caddy_config:
###< dunglas/symfony-docker ###
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
